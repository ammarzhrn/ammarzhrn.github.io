<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@300;900&display=swap"rel="stylesheet">

    <style>
        *{
            margin: 0;
            overflow: hidden;
        }
        .container{
            width: 100vw;
            height: 94vh;
            display: flex;
            justify-content: center;
        }
        .h1{
            color: rgba(0, 0, 0, 0);
            font-family: 'Big Shoulders Display';
            padding-top: 30px;
            font-size: 770px;
            letter-spacing: -50px;
            text-align: center;
            transition: letter-spacing 0.3s ease, color 0.3s ease;
        }
        .h1:hover{
            color: black;
            letter-spacing: -20px;
        }
        .klik{
            padding-top: -200px;
            font-size: 15px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            letter-spacing: 0px;
            text-decoration: none;
            color: #0000009e;
            transition: color 0.3s ease;
        }
        .klik:hover{
            color: black;
        }
        div{
            display: flex;
            justify-content: center;
        }
        img{
            position: absolute;
            left: 50%;
            right: 50%;
            top: 3.5%;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        img:hover{
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <img src="logo-black.ver.png" height="40px" alt="">
    <div class="container">
        <h1 class="h1">HELLO</h1>
    </div>
    <div class="klik_div">
        <a class="klik" href="index.html">click to continue</a>
    </div>
</body>
</html>
