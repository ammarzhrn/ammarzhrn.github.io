<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Tomodoro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@300;700;900&family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap"
        rel="stylesheet">

    <script>
        // script.js
        document.addEventListener("DOMContentLoaded", function () {
            const navLinks = document.querySelectorAll("a");

            navLinks.forEach(link => {
                link.addEventListener("click", smoothScroll);
            });

            function smoothScroll(event) {
                event.preventDefault();
                const targetId = event.target.getAttribute("href");
                const targetElement = document.querySelector(targetId);

                // Scroll smoothly to the target section
                targetElement.scrollIntoView({
                    behavior: "smooth"
                });
            }
        });
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #FF8329;
        }

        .hero1 {
            height: 100vh;
            width: 100%;
        }

        .title {
            height: 20%;
            width: 100%;
            text-align: center;
            color: white;
        }

        .title h1 {
            font-family: 'Plus Jakarta Sans';
            font-size: 130px;
            letter-spacing: -3px;
            font-weight: 800;
            margin-top: 20px;
        }

        .title h3 {
            font-family: 'Plus Jakarta Sans';
            margin-top: -10px;
            font-size: 30px;
            font-weight: 300;
        }

        .screen1 {
            display: flex;
            justify-content: space-between;
            align-items: end;
            width: 100%;
            height: 65%;
            margin-top: 40px;
        }

        .screen1 img {
            height: 100%;
        }

        .team {
            margin-left: 45px;
            margin-bottom: -20px;
            font-size: 17px;
            font-family: 'Plus Jakarta Sans';
            font-weight: 300;
            text-align: left;
            color: white;
        }

        .final {
            margin-right: 45px;
            margin-bottom: -20px;
            font-size: 17px;
            font-family: 'Plus Jakarta Sans';
            font-weight: 300;
            text-align: right;
            color: white;
        }

        .hero2 {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main_section {
            height: 100%;
            width: 60%;
            background: white;
        }

        .screen_section {
            height: 100%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }

        .screen_section img {
            width: 60%;
        }

        .next_div {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 25px;
        }

        .next1 {
            opacity: 1;
            text-align: center;
            color: white;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .next1:hover {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <section class="section1">
        <div class="hero1">
            <div class="title">
                <h1>TOMODORO</h1>
                <h3>Mobile App</h3>
            </div>
            <div class="screen1">
                <div class="team">
                    <h4>Team</h4>
                    <p>Pendekar Software</p>
                </div>
                <img src="screen1.png" alt="">
                <div class="final">
                    <h4>Android</h4>
                    <p>Final Project</p>
                </div>
            </div>
            <div class="next_div">
                <a class="next1" href="#section2">NEXT</a>
            </div>
        </div>
    </section>

    <section id="section2">
        <div class="hero2">
            <div class="screen_section">
                <img src="tomodoro-screen2.png" alt="">
            </div>
            <div class="main_section">

            </div>

        </div>
    </section>
</body>

</html>
